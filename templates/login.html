<!DOCTYPE html>
<html>
<head>
    <title>CoLeague Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-page">

  <!-- Single trunk line dropping from top-centre, with 3 commit nodes -->
  <svg class="branch-bg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMin slice" xmlns="http://www.w3.org/2000/svg">
    <line class="trunk-line" x1="720" y1="0" x2="720" y2="460"/>
  </svg>

  <div class="card">
    <div class="card-icon">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- top-left node -->
        <circle cx="5" cy="6" r="2.5" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="5" cy="6" r="1" fill="currentColor"/>
        <!-- top-right node -->
        <circle cx="19" cy="6" r="2.5" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="19" cy="6" r="1" fill="currentColor"/>
        <!-- bottom-centre node -->
        <circle cx="12" cy="20" r="2.5" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="12" cy="20" r="1" fill="currentColor"/>
        <!-- stem up from bottom node -->
        <line x1="12" y1="17.5" x2="12" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <!-- horizontal crossbar -->
        <line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <!-- left vertical up to top-left node -->
        <line x1="5" y1="12" x2="5" y2="8.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <!-- right vertical up to top-right node -->
        <line x1="19" y1="12" x2="19" y2="8.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>

    <h1>Welcome to CoLeague Setup</h1>
    <p class="subtitle">// connect your accounts to get started: </p>

    <div class="divider"></div>

    <a href="{{ auth_url }}" class="btn btn-discord">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
        <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.003.022.015.043.032.054a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
      </svg>
      Link Discord &amp; Add Bot
      <span class="step-badge badge-active">step 1</span>
    </a>


  </div>

</body>
</html>
