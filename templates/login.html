<!DOCTYPE html>
<html>
<head>
    <title>CoLeague Login</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
          --bg:        #0a0c10;
          --surface:   #111318;
          --border:    #21262d;
          --text:      #e6edf3;
          --muted:     #8b949e;
          --discord:   #5865F2;
          --discord-h: #4752c4;
          --node:      #c5b8ff;
          --branch:    #a992ff;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
          min-height: 100vh;
          background: var(--bg);
          color: var(--text);
          font-family: 'Syne', sans-serif;
          display: flex;
          align-items: center;
          justify-content: center;
          overflow: hidden;
          position: relative;
        }

        /* Subtle noise grain */
        body::after {
          content: '';
          position: fixed;
          inset: 0;
          opacity: 0.02;
          pointer-events: none;
          z-index: 1;
          background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
          background-size: 180px 180px;
        }

        /* ── Branch SVG ── */
        .branch-bg {
          position: fixed;
          top: 0; left: 0;
          width: 100%; height: 100%;
          z-index: 0;
          pointer-events: none;
        }

        .trunk-line {
          stroke: var(--branch);
          stroke-width: 2;
          fill: none;
          stroke-linecap: round;
          stroke-dasharray: 500;
          stroke-dashoffset: 500;
          animation: draw-trunk 1.2s 0.2s cubic-bezier(.4,0,.2,1) forwards;
        }

        @keyframes draw-trunk {
          to { stroke-dashoffset: 0; }
        }



        /* ── Card ── */
        .card {
          position: relative;
          z-index: 10;
          background: var(--surface);
          border: 1px solid var(--border);
          border-radius: 12px;
          padding: 48px 44px 40px;
          width: 100%;
          max-width: 420px;
          /* Highlight animation fires after branch finishes (~1.5s) */
          animation:
            card-in     0.7s  0.1s  cubic-bezier(.16,1,.3,1) both,
            card-pulse  2.4s  1.55s ease-in-out infinite;
          box-shadow: 0 16px 48px rgba(0,0,0,0.6);
        }

        @keyframes card-in {
          from { opacity: 0; transform: translateY(20px) scale(0.97); }
          to   { opacity: 1; transform: translateY(0)   scale(1); }
        }

        @keyframes card-pulse {
          0%, 100% {
            border-color: rgba(169,146,255,0.15);
            box-shadow:
              0 0 0 1px rgba(169,146,255,0.08),
              0 0 12px rgba(169,146,255,0.05),
              0 16px 48px rgba(0,0,0,0.6);
          }
          50% {
            border-color: rgba(169,146,255,0.6);
            box-shadow:
              0 0 0 1px rgba(169,146,255,0.4),
              0 0 28px rgba(169,146,255,0.2),
              0 0 60px rgba(169,146,255,0.08),
              0 16px 48px rgba(0,0,0,0.6);
          }
        }

        /* Top edge glow — fades in after card-glow */
        .card::before {
          content: '';
          position: absolute;
          top: -1px; left: 15%; right: 15%;
          height: 1px;
          background: linear-gradient(90deg, transparent, var(--branch), transparent);
          border-radius: 50%;
          opacity: 0;
          animation: edge-glow 0.5s 1.7s ease forwards;
        }

        @keyframes edge-glow {
          to { opacity: 1; }
        }

        .card-icon {
          width: 48px; height: 48px;
          background: rgba(169,146,255,0.12);
          border: 1px solid rgba(169,146,255,0.3);
          border-radius: 10px;
          display: flex;
          align-items: center;
          justify-content: center;
          margin-bottom: 24px;
        }
        .card-icon svg { width: 24px; height: 24px; color: var(--node); }

        h1 {
          font-size: 1.5rem;
          font-weight: 800;
          letter-spacing: -0.02em;
          line-height: 1.2;
          margin-bottom: 8px;
        }

        .subtitle {
          font-size: 0.875rem;
          color: var(--muted);
          margin-bottom: 32px;
          font-family: 'JetBrains Mono', monospace;
        }

        .divider { height: 1px; background: var(--border); margin-bottom: 28px; }

        .btn {
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 10px;
          width: 100%;
          padding: 13px 20px;
          border-radius: 8px;
          font-family: 'Syne', sans-serif;
          font-size: 0.9375rem;
          font-weight: 600;
          cursor: pointer;
          border: none;
          transition: background 0.18s, transform 0.12s, box-shadow 0.18s;
          text-decoration: none;
          margin-bottom: 12px;
          letter-spacing: 0.01em;
        }

        .btn-discord {
          background: var(--discord);
          color: #fff;
          box-shadow: 0 4px 16px rgba(88,101,242,0.35);
        }
        .btn-discord:hover {
          background: var(--discord-h);
          transform: translateY(-1px);
          box-shadow: 0 6px 24px rgba(88,101,242,0.5);
        }
        .btn-discord:active {
          transform: translateY(0);
        }


        .step-badge {
          font-family: 'JetBrains Mono', monospace;
          font-size: 0.7rem;
          font-weight: 600;
          letter-spacing: 0.06em;
          text-transform: uppercase;
          padding: 3px 8px;
          border-radius: 4px;
          margin-left: auto;
        }
        .badge-active {
          background: rgba(255,255,255,0.15);
          color: #fff;
          border: 1px solid rgba(255,255,255,0.25);
        }

    </style>
</head>
<body>

  <!-- Single trunk line dropping from top-centre, with 3 commit nodes -->
  <svg class="branch-bg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMin slice" xmlns="http://www.w3.org/2000/svg">
    <line class="trunk-line" x1="720" y1="0" x2="720" y2="460"/>
  </svg>

  <div class="card">
    <div class="card-icon">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- top-left node -->
        <circle cx="5" cy="6" r="2.5" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="5" cy="6" r="1" fill="currentColor"/>
        <!-- top-right node -->
        <circle cx="19" cy="6" r="2.5" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="19" cy="6" r="1" fill="currentColor"/>
        <!-- bottom-centre node -->
        <circle cx="12" cy="20" r="2.5" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="12" cy="20" r="1" fill="currentColor"/>
        <!-- stem up from bottom node -->
        <line x1="12" y1="17.5" x2="12" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <!-- horizontal crossbar -->
        <line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <!-- left vertical up to top-left node -->
        <line x1="5" y1="12" x2="5" y2="8.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <!-- right vertical up to top-right node -->
        <line x1="19" y1="12" x2="19" y2="8.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>

    <h1>Welcome to CoLeague Setup</h1>
    <p class="subtitle">// connect your accounts to get started: </p>

    <div class="divider"></div>

    <a href="{{ auth_url }}" class="btn btn-discord">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
        <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.003.022.015.043.032.054a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
      </svg>
      Link Discord &amp; Add Bot
      <span class="step-badge badge-active">step 1</span>
    </a>


  </div>

</body>
</html>
