<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoLeague</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Welcome to the Frontend</h1>
    <p>This page is being served by Flask!</p>
    <h3>Welcome, {{ username }}!</h3>
    <p><a href="{{ url_for('settings') }}">Open Settings</a></p>
    <p>Manage your servers below:</p>
    <ul>
    {% for guild in guilds %}
        <li>
            <b>{{ guild.name }}</b> 
            {% if guild.bot_exists %}
                ✅ <a href="/dashboard/{{ guild.id }}">Select Server</a>
            {% else %}
                ❌ <a href="https://discord.com/api/oauth2/authorize?client_id={{ client_id }}&scope=bot&permissions=65536&guild_id={{ guild.id }}&disable_guild_select=true&redirect_uri={{ redirect_uri }}&response_type=code">
                    <button>Add Bot to this Server</button>
                </a>
            {% endif %}
        </li>
    {% endfor %}
    </ul>
    <hr>
    <a href="/">Reset Session</a>
</body>
</html>
